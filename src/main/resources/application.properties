# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8000}

# ─── Database (Ubuntu PostgreSQL 16) ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=anurag-university-super-secret-key-2024-change-in-production-must-be-256bits
jwt.expiration-minutes=480

# ─── Mail (SMTP via Gmail) ────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── App Settings ─────────────────────────────────────────────────────────────
app.allowed-domain=anurag.edu.in
app.frontend-url=http://localhost:5173
app.mail.from=noreply@anurag.edu.in
app.mail.from-name=Anurag University Events

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.anurag=INFO
logging.level.org.springframework.security=WARN
